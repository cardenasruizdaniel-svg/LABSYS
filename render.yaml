services:
  - type: web
    name: labsys-dializar
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.14"
      - key: APP_NAME
        value: "LABSYS DIALIZAR"
      - key: APP_VERSION
        value: "1.0.0"
      - key: DEBUG
        value: "false"
