<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0B5ED7">
    <title>LABSYS DIALIZAR - Móvil</title>
    <link rel="manifest" href="/static/manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/mobile.css" rel="stylesheet">
</head>
<body class="mobile-login">
    <div class="mobile-container">
        <div class="login-card">
            <div class="login-logo">
                <img id="mobileLogo" src="" alt="" style="display:none;height:90px;object-fit:contain;border-radius:10px;background:#fff;padding:6px;">
                <span id="mobileLogoFallback"><i class="bi bi-heart-pulse-fill"></i></span>
            </div>
            <h1 class="login-title" id="mobileNombre">LABSYS DIALIZAR</h1>
            <p class="login-subtitle">Aplicación Móvil</p>

            <div id="alertaLogin" class="alert alert-danger py-2 d-none"></div>

            <form id="loginForm" onsubmit="return false;">
                <div class="input-group">
                    <i class="bi bi-person input-icon"></i>
                    <input type="text" id="loginUsuario" placeholder="Usuario" autocomplete="username" required>
                </div>
                <div class="input-group">
                    <i class="bi bi-lock input-icon"></i>
                    <input type="password" id="loginPassword" placeholder="Contraseña" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn-login" id="btnLogin">
                    <i class="bi bi-box-arrow-in-right"></i> Ingresar
                </button>
            </form>

            <div class="login-footer">
                <small>Solo usuarios con acceso habilitado</small>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get("error") === "acceso") {
            document.getElementById("alertaLogin").textContent = "No tiene acceso a la aplicación móvil. Contacte al administrador.";
            document.getElementById("alertaLogin").classList.remove("d-none");
        }

        document.getElementById("btnLogin").addEventListener("click", async () => {
            const usuario = document.getElementById("loginUsuario").value.trim();
            const password = document.getElementById("loginPassword").value;

            if (!usuario || !password) {
                document.getElementById("alertaLogin").textContent = "Ingrese usuario y contraseña.";
                document.getElementById("alertaLogin").classList.remove("d-none");
                return;
            }

            try {
                const resp = await fetch("/auth/mobile-login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ usuario, password }),
                });

                if (!resp.ok) {
                    const err = await resp.json();
                    document.getElementById("alertaLogin").textContent = err.detail || "Error de autenticación.";
                    document.getElementById("alertaLogin").classList.remove("d-none");
                    return;
                }

                window.location.href = "/mobile/dashboard";
            } catch (e) {
                document.getElementById("alertaLogin").textContent = "Error de conexión.";
                document.getElementById("alertaLogin").classList.remove("d-none");
            }
        });

        document.getElementById("loginPassword").addEventListener("keydown", (e) => {
            if (e.key === "Enter") document.getElementById("btnLogin").click();
        });

        (async function () {
            try {
                const r = await fetch("/configuracion/");
                if (!r.ok) return;
                const cfg = await r.json();
                if (cfg.logo_path) {
                    const img = document.getElementById("mobileLogo");
                    img.src = "/static/" + cfg.logo_path;
                    img.style.display = "inline-block";
                    document.getElementById("mobileLogoFallback").style.display = "none";
                }
                if (cfg.nombre_laboratorio) {
                    document.getElementById("mobileNombre").textContent = cfg.nombre_laboratorio;
                }
            } catch (e) {}
        })();
    </script>
</body>
</html>
