{% extends "base.html" %}

{% block titulo %}EPS - LABSYS DIALIZAR{% endblock %}

{% block contenido %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="mb-0"><i class="bi bi-building"></i> EPS</h2>
    <button class="btn btn-primary btn-sm" id="btnNuevaEps">
        <i class="bi bi-plus-circle"></i> Nueva EPS
    </button>
</div>

<div id="alertaEps"></div>

<div class="card shadow-sm">
    <div class="card-body">
        <table class="table table-hover align-middle">
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Nombre</th>
                    <th>NIT</th>
                    <th>Teléfono</th>
                    <th>Correo</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="tablaEps">
                <tr><td colspan="6" class="text-muted small">Cargando...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal: nueva / editar EPS -->
<div class="modal fade" id="modalEps" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="tituloModalEps">Nueva EPS</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="alertaModalEps"></div>
                <input type="hidden" id="epsId">
                <div class="mb-2">
                    <label class="form-label">Código</label>
                    <input class="form-control" id="epsCodigo">
                </div>
                <div class="mb-2">
                    <label class="form-label">Nombre</label>
                    <input class="form-control" id="epsNombre">
                </div>
                <div class="mb-2">
                    <label class="form-label">NIT</label>
                    <input class="form-control" id="epsNit">
                </div>
                <div class="row g-2">
                    <div class="col-6">
                        <label class="form-label">Teléfono</label>
                        <input class="form-control" id="epsTelefono">
                    </div>
                    <div class="col-6">
                        <label class="form-label">Correo</label>
                        <input type="email" class="form-control" id="epsCorreo">
                    </div>
                </div>
                <div class="mb-2 mt-2">
                    <label class="form-label">Dirección</label>
                    <input class="form-control" id="epsDireccion">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-primary" id="btnGuardarEps">Guardar</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block javascript %}
<script src="/static/js/eps.js"></script>
{% endblock %}
