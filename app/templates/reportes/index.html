{% extends "base.html" %}

{% block titulo %}Reportes - LABSYS DIALIZAR{% endblock %}

{% block contenido %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="mb-0"><i class="bi bi-bar-chart"></i> Reportes Gerenciales</h2>
    <div>
        <a class="btn btn-outline-primary btn-sm" href="/reportes/indicadores/pdf" target="_blank">
            <i class="bi bi-file-earmark-pdf"></i> Exportar PDF
        </a>
        <a class="btn btn-outline-success btn-sm" href="/reportes/indicadores/excel">
            <i class="bi bi-file-earmark-excel"></i> Exportar Excel
        </a>
    </div>
</div>

<div id="alertaReportes"></div>

<div class="row g-3 mb-3" id="tarjetasIndicadores"></div>

<div class="row g-3 mb-3">
    <div class="col-lg-6">
        <div class="card shadow-sm h-100">
            <div class="card-header bg-white"><strong>Producción del laboratorio</strong></div>
            <div class="card-body" id="tarjetasProduccion"></div>
        </div>
    </div>
    <div class="col-lg-6">
        <div class="card shadow-sm h-100">
            <div class="card-header bg-white"><strong>Resumen financiero</strong></div>
            <div class="card-body" id="tarjetasFinanciero"></div>
        </div>
    </div>
</div>

<div class="row g-3">
    <div class="col-lg-6">
        <div class="card shadow-sm">
            <div class="card-header bg-white"><strong>Órdenes por estado</strong></div>
            <div class="card-body">
                <table class="table table-sm mb-0" id="tablaOrdenesEstado"></table>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block javascript %}
<script src="/static/js/reportes.js"></script>
{% endblock %}
