{% extends "base.html" %}

{% block contenido %}

<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Nuevo Paciente</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4 mb-5">

    <h2>Registro de Pacientes</h2>

    <hr>

<form action="/pacientes/guardar" method="post">

<div class="card">

<div class="card-header bg-primary text-white">

Información Personal

</div>

<div class="card-body">

<div class="row">

<div class="col-md-2">

<label>Tipo Documento</label>

<select
class="form-select"
name="tipo_documento">

<option>CC</option>

<option>TI</option>

<option>CE</option>

<option>RC</option>

<option>PA</option>

</select>

</div>

<div class="col-md-4">

<label>Documento</label>

<input
type="text"
name="documento"
class="form-control"
required>

</div>

<div class="col-md-3">

<label>Primer Nombre</label>

<input
type="text"
name="primer_nombre"
class="form-control"
required>

</div>

<div class="col-md-3">

<label>Segundo Nombre</label>

<input
type="text"
name="segundo_nombre"
class="form-control">

</div>

</div>

<br>

<div class="row">

<div class="col-md-3">

<label>Primer Apellido</label>

<input
type="text"
name="primer_apellido"
class="form-control"
required>

</div>

<div class="col-md-3">

<label>Segundo Apellido</label>

<input
type="text"
name="segundo_apellido"
class="form-control">

</div>

<div class="col-md-3">

<label>Fecha Nacimiento</label>

<input
type="date"
name="fecha_nacimiento"
class="form-control">

</div>

<div class="col-md-3">

<label>Sexo</label>

<select
class="form-select"
name="sexo">

<option>Masculino</option>

<option>Femenino</option>

<option>Otro</option>

</select>

</div>

</div>

</div>

</div>

<br>

<div class="card">

<div class="card-header bg-success text-white">

Información de Contacto

</div>

<div class="card-body">

<div class="row">

<div class="col-md-6">

<label>Dirección</label>

<input
class="form-control"
name="direccion">

</div>

<div class="col-md-3">

<label>Barrio</label>

<input
class="form-control"
name="barrio">

</div>

<div class="col-md-3">

<label>Municipio</label>

<input
class="form-control"
name="municipio">

</div>

</div>

<br>

<div class="row">

<div class="col-md-3">

<label>Departamento</label>

<input
class="form-control"
name="departamento">

</div>

<div class="col-md-3">

<label>Celular</label>

<input
class="form-control"
name="celular">

</div>

<div class="col-md-3">

<label>Teléfono</label>

<input
class="form-control"
name="telefono">

</div>

<div class="col-md-3">

<label>Correo</label>

<input
type="email"
class="form-control"
name="correo">

</div>

</div>

</div>

</div>

<br>

<div class="card">

<div class="card-header bg-info text-white">

Información Clínica

</div>

<div class="card-body">

<div class="row">

<div class="col-md-3">

<label>EPS</label>

<select
name="eps_id"
class="form-select">

<option value="">Seleccione...</option>

{% for e in eps %}

<option value="{{e.id}}">

{{e.nombre}}

</option>

{% endfor %}

</select>

</div>

<div class="col-md-3">

<label>Régimen</label>

<select
name="regimen"
class="form-select">

<option>Contributivo</option>

<option>Subsidiado</option>

<option>Particular</option>

</select>

</div>

<div class="col-md-3">

<label>Grupo Sanguíneo</label>

<select
name="grupo_sanguineo"
class="form-select">

<option>A</option>
<option>B</option>
<option>AB</option>
<option>O</option>

</select>

</div>

<div class="col-md-3">

<label>RH</label>

<select
name="rh"
class="form-select">

<option>+</option>
<option>-</option>

</select>

</div>

</div>

<br>

<div class="row">

<div class="col-md-12">

<label>Observaciones</label>

<textarea
class="form-control"
rows="4"
name="observaciones"></textarea>

</div>

</div>

</div>

</div>

<br>

<div class="text-end">

<br>

<div class="card">

    <div class="card-header bg-warning">

        <strong>Acompañante / Contacto de Emergencia</strong>

    </div>

    <div class="card-body">

        <div class="row">

            <div class="col-md-6">

                <label>Nombre Completo</label>

                <input
                    type="text"
                    name="acompanante_nombre"
                    class="form-control">

            </div>

            <div class="col-md-3">

                <label>Documento</label>

                <input
                    type="text"
                    name="acompanante_documento"
                    class="form-control">

            </div>

            <div class="col-md-3">

                <label>Parentesco</label>

                <select
                    name="acompanante_parentesco"
                    class="form-select">

                    <option>Padre</option>
                    <option>Madre</option>
                    <option>Hijo</option>
                    <option>Hermano</option>
                    <option>Esposo(a)</option>
                    <option>Abuelo(a)</option>
                    <option>Otro</option>

                </select>

            </div>

        </div>

        <br>

        <div class="row">

            <div class="col-md-4">

                <label>Celular</label>

                <input
                    type="text"
                    name="acompanante_celular"
                    class="form-control">

            </div>

            <div class="col-md-4">

                <label>Correo</label>

                <input
                    type="email"
                    name="acompanante_correo"
                    class="form-control">

            </div>

            <div class="col-md-4">

                <label>Dirección</label>

                <input
                    type="text"
                    name="acompanante_direccion"
                    class="form-control">

            </div>

        </div>

    </div>

</div>    

<button
class="btn btn-success btn-lg">

Guardar Paciente

</button>

<a
href="/pacientes"
class="btn btn-secondary btn-lg">

Cancelar

</a>

</div>

</form>

</div>

</body>

</html>

{% endblock %}
